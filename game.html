<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUILD — Chris Lund</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace}
  #wrap{position:relative}
  canvas{border:4px solid #334;image-rendering:pixelated;width:min(90vw,800px);height:auto}
  #overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;justify-content:center;align-items:center;flex-direction:column;z-index:10}
  #terminal{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#0a0a0f;color:#0f0;padding:24px;overflow-y:auto;font-size:10px;line-height:1.8;z-index:20}
  #terminal a{color:#ff0;text-decoration:none}
  #terminal a:hover{text-decoration:underline}
  #terminal .cursor{animation:blink .8s infinite}
  @keyframes blink{50%{opacity:0}}
  #hud{position:absolute;top:8px;left:8px;color:#fff;font-size:10px;text-shadow:2px 2px #000;z-index:5;pointer-events:none}
  #cta{display:none;position:absolute;bottom:30%;width:100%;text-align:center;color:#ff0;font-size:11px;z-index:15;text-shadow:2px 2px #000;animation:pulse 1.5s infinite}
  @keyframes pulse{50%{opacity:.4}}
  #mobile{display:none;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:8;gap:4px}
  @media(pointer:coarse){#mobile{display:flex}}
  #mobile button{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 16px;background:#222;color:#fff;border:2px solid #555;border-radius:2px;touch-action:manipulation}
  #mobile button:active{background:#444}
</style>
</head>
<body>

<div id="wrap">
  <canvas id="c" width="480" height="270"></canvas>
  <div id="hud"></div>
  <div id="cta"></div>
  <div id="overlay">
    <div style="color:#ff0;font-size:14px;text-align:center">BUILD</div>
    <div style="color:#fff;font-size:8px;margin-top:12px;text-align:center;line-height:2">ARROW KEYS / WASD TO MOVE<br>COLLECT ALL TOOLS<br>REACH THE DOOR</div>
    <div style="color:#0f0;font-size:7px;margin-top:16px;cursor:pointer" onclick="startGame()">[ PRESS SPACE TO START ]</div>
  </div>
  <div id="terminal"></div>
  <div id="mobile">
    <button onpointerdown="keys.left=1" onpointerup="keys.left=0" onpointerleave="keys.left=0">◀</button>
    <button onpointerdown="keys.up=1" onpointerup="keys.up=0" onpointerleave="keys.up=0">▲</button>
    <button onpointerdown="keys.down=1" onpointerup="keys.down=0" onpointerleave="keys.down=0">▼</button>
    <button onpointerdown="keys.right=1" onpointerup="keys.right=0" onpointerleave="keys.right=0">▶</button>
  </div>
</div>

<script>
// ═══════════ CONFIGURE PER COMPANY ═══════════
const COMPANY = "Structured AI";
const ACCENT  = "#ff8800"; // orange for construction
const PORTFOLIO = `
╔══════════════════════════════════════╗
║   CHRIS LUND —  ${COMPANY}        ║
╚══════════════════════════════════════╝

> WHO I AM
  Construction supervisor → self-taught developer.
  Ran my own company. Managed crews. Built 13
  open-source tools for AI agents. First HackerOne
  bug bounty submitted to Anthropic. I build things
  that work — on the job site and in the terminal.

> TOOLS I'VE BUILT (all shipped, all open-source)
  ▸ AgentLedger — tamper-evident audit logs
  ▸ CostOracle — pre-flight cost estimator
  ▸ GroundTruth — hallucination canary
  ▸ AgentCard — agent capability negotiation
  ▸ RedHawk — zero-dep security audit toolkit
  ▸ RepCheck — agent reputation infrastructure
  ...and 7 more at github.com/realMNohgee

> WHY ${COMPANY.toUpperCase()}
  I don't just understand the problem space — I've
  lived it. Construction workflows, crew management,
  and now AI automation. I bridge both worlds.

> LINKS
  ▸ GitHub:   https://github.com/realMNohgee
  ▸ Hermtica: https://hermtica.com
  ▸ Email:    clund25@gmail.com

> READY TO BUILD. LET'S TALK.
  `;

// ═══════════ GAME ENGINE ═══════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 270;
const GROUND = 220;
const GRAVITY = 0.6, JUMP = -9, SPEED = 3;

let player = { x: 40, y: GROUND-16, w: 16, h: 24, vy: 0, onGround: true, facing: 1 };
let keys = {};
let gameState = 'title'; // title | playing | win | portfolio
let collected = 0;
const TOTAL_TOOLS = 8;

// Collectible tools scattered across the level
let tools = [
  {x:80,y:GROUND-30},{x:140,y:GROUND-30},{x:200,y:GROUND-30},
  {x:260,y:GROUND-30},{x:320,y:GROUND-30},{x:380,y:GROUND-30},
  {x:130,y:GROUND-70},{x:350,y:GROUND-70}
].map((t,i) => ({...t, w:12, h:12, collected:false, id:i}));

// Obstacles
let spikes = [
  {x:110,y:GROUND-10,w:20,h:10},{x:230,y:GROUND-10,w:20,h:10},
  {x:300,y:GROUND-10,w:20,h:10},{x:410,y:GROUND-10,w:20,h:10}
];

// Door at the end
let door = { x: 440, y: GROUND-36, w: 20, h: 36 };

// Particles for effects
let particles = [];
let terminalText = '';
let terminalIndex = 0;
let terminalTimer = 0;

function startGame() {
  player = { x: 40, y: GROUND-16, w: 16, h: 24, vy: 0, onGround: true, facing: 1 };
  tools.forEach(t => t.collected = false);
  collected = 0;
  particles = [];
  terminalText = '';
  terminalIndex = 0;
  gameState = 'playing';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('terminal').style.display = 'none';
  document.getElementById('cta').style.display = 'none';
}

function update() {
  if (gameState !== 'playing' && gameState !== 'win') return;

  if (gameState === 'win') {
    terminalTimer++;
    if (terminalTimer % 2 === 0 && terminalIndex < PORTFOLIO.length) {
      terminalIndex++;
      terminalText = PORTFOLIO.substring(0, terminalIndex);
    }
    if (terminalIndex >= PORTFOLIO.length && terminalTimer > 120) {
      gameState = 'portfolio';
      document.getElementById('terminal').innerHTML = PORTFOLIO.replace(/\n/g,'<br>').replace(/\s\s/g,'&nbsp;&nbsp;') + '<span class="cursor">█</span>';
      document.getElementById('terminal').style.display = 'block';
    }
    return;
  }

  // Movement
  let mx = 0;
  if (keys.ArrowLeft || keys.KeyA || keys.left) mx = -1;
  if (keys.ArrowRight || keys.KeyD || keys.right) mx = 1;

  player.x += mx * SPEED;
  player.facing = mx !== 0 ? mx : player.facing;

  // Jump
  if ((keys.ArrowUp || keys.KeyW || keys.Space || keys.up) && player.onGround) {
    player.vy = JUMP;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // Ground collision
  if (player.y + player.h >= GROUND) {
    player.y = GROUND - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  // Bounds
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > W) player.x = W - player.w;

  // Spike check
  for (let s of spikes) {
    if (rectOverlap(player, s)) {
      startGame(); // reset on death
      gameState = 'playing';
      return;
    }
  }

  // Tool collection
  for (let t of tools) {
    if (!t.collected && rectOverlap(player, t)) {
      t.collected = true;
      collected++;
      for (let i=0;i<8;i++) particles.push({
        x:t.x+t.w/2, y:t.y+t.h/2,
        vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-2,
        life:20, color:ACCENT
      });
    }
  }

  // Door check
  if (collected >= TOTAL_TOOLS && rectOverlap(player, door)) {
    // Instant portfolio reveal — no typing animation
    gameState = 'portfolio';
    document.getElementById('terminal').innerHTML = PORTFOLIO.replace(/\n/g,'<br>').replace(/\s\s/g,'&nbsp;&nbsp;') + '<span class="cursor">█</span>';
    document.getElementById('terminal').style.display = 'block';
    document.getElementById('hud').style.display = 'none';
    // Celebration particles
    for (let i=0;i<40;i++) particles.push({
      x:door.x+10, y:door.y,
      vx:(Math.random()-0.5)*6, vy:Math.random()*-6-2,
      life:40, color:'#'+Math.floor(Math.random()*16777215).toString(16)
    });
  }

  // Update particles
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // HUD
  document.getElementById('hud').innerHTML = `TOOLS: ${collected}/${TOTAL_TOOLS}<br>${COMPANY}`;
}

function rectOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function draw() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0,0,W,H);

  // Grid lines (subtle)
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for (let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Ground
  ctx.fillStyle = '#222';
  ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle = '#333';
  ctx.fillRect(0,GROUND,W,3);

  // Door
  ctx.fillStyle = collected >= TOTAL_TOOLS ? '#0f0' : '#333';
  ctx.fillRect(door.x, door.y, door.w, door.h);
  ctx.fillStyle = '#000';
  ctx.fillRect(door.x+4, door.y+6, 5, 8); // handle
  if (collected >= TOTAL_TOOLS) {
    ctx.fillStyle = '#0f0';
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText('ENTER',door.x-18,door.y-6);
  }

  // Spikes
  for (let s of spikes) {
    ctx.fillStyle = '#c00';
    ctx.beginPath();
    ctx.moveTo(s.x, s.y+s.h);
    ctx.lineTo(s.x+s.w/2, s.y);
    ctx.lineTo(s.x+s.w, s.y+s.h);
    ctx.fill();
  }

  // Tools
  for (let t of tools) {
    if (t.collected) continue;
    ctx.fillStyle = ACCENT;
    ctx.fillRect(t.x, t.y, t.w, t.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(t.x+3, t.y+3, 3, 3);
    ctx.fillRect(t.x+7, t.y+3, 2, 3);
    // Bob
    t.y += Math.sin(Date.now()/400 + t.id) * 0.3;
  }

  // Player (little builder)
  if (gameState === 'playing' || gameState === 'win') {
    // Body
    ctx.fillStyle = '#3498db';
    ctx.fillRect(player.x+4, player.y+4, 8, 14);
    // Hard hat
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(player.x+3, player.y, 10, 5);
    // Eyes
    ctx.fillStyle = '#fff';
    let ex = player.facing > 0 ? 3 : 1;
    ctx.fillRect(player.x+ex+6, player.y+6, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x+ex+7, player.y+7, 1, 1);
    // Boots
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(player.x+3, player.y+18, 5, 4);
    ctx.fillRect(player.x+8, player.y+18, 5, 4);
  }

  // Particles
  for (let p of particles) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }

  // Win state terminal text (typing overlay)
  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(20,20,W-40,H-40);
    ctx.fillStyle = '#0f0';
    ctx.font = '8px "Press Start 2P"';
    let lines = terminalText.split('\n');
    for (let i=0;i<Math.min(lines.length,20);i++) {
      ctx.fillText(lines[i], 30, 44+i*12);
    }
    if (terminalIndex < PORTFOLIO.length) {
      ctx.fillText('█', 30 + (lines[lines.length-1]?.length||0)*5.5, 44+(Math.min(lines.length-1,19))*12);
    }
  }

  // Title overlay
  if (gameState === 'title') {
    document.getElementById('overlay').style.display = 'flex';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Keyboard
document.addEventListener('keydown', e => {
  keys[e.code] = 1;
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'title') startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = 0; });

// Start
document.getElementById('overlay').style.display = 'flex';
loop();
</script>
</body>
</html>
